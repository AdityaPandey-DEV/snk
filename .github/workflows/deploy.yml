name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or the branch you're deploying from

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build your static site
        run: |
          npm install
          npm run build  # make sure this generates your static content

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist  # path to your generated site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages  # ✅ This line fixes the error
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
